name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Set up Gradle (ensure correct version for Flutter)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Ensure Gradle wrapper exists (generate if missing)
        working-directory: android
        run: |
          # If both gradlew and the wrapper jar exist, nothing to do.
          if [ -f gradlew ] && [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Gradle wrapper already exists"
          else
            echo "Generating Gradle wrapper in android/ ..."
            gradle wrapper --gradle-version 8.7
          fi

      - name: Make gradlew executable (if present)
        run: |
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
            echo "Made android/gradlew executable"
          else
            echo "No android/gradlew to chmod"
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yemen-law-app-release
          path: build/app/outputs/flutter-apk/*.apk
