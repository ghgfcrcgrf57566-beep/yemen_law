name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/zulu-17
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Java (Zulu 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew || true

      # Temporary CI fix: if Gradle wrapper files are missing, install Gradle and generate the wrapper
      - name: Ensure Gradle installed (for generating wrapper if needed)
        run: |
          if ! command -v gradle >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gradle
          else
            echo "gradle already installed"
          fi

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — generating wrapper in android/ ..."
            (cd android && gradle wrapper) || (echo "Failed to generate wrapper"; exit 1)
          else
            echo "Gradle wrapper exists"
          fi

      - name: Accept Android licenses (if needed)
        if: runner.os == 'Linux'
        run: |
          if command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager --licenses
          else
            echo "sdkmanager not found — skipping license acceptance"
          fi

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/*.apk
