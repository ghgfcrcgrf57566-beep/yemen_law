name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Show environment info
        run: |
          echo "=== java -version ==="
          java -version || true
          echo "=== flutter doctor -v ==="
          flutter doctor -v || true
          echo "=== FLUTTER_ROOT & PUB_CACHE ==="
          echo "FLUTTER_ROOT: $FLUTTER_ROOT"
          echo "PUB_CACHE: $PUB_CACHE"

      - name: Set up Gradle (needed if we must generate wrapper in CI)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Ensure Gradle wrapper exists (generate if missing)
        working-directory: .
        run: |
          if [ -f android/gradlew ]; then
            echo "gradlew already exists"
          else
            echo "gradlew not found — generating Gradle wrapper in android/ ..."
            cd android
            gradle wrapper --gradle-version 8.6
            cd ..
          fi

      - name: Make gradlew executable (if present)
        run: |
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
            echo "Made android/gradlew executable"
          else
            echo "No android/gradlew to chmod"
          fi

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Android APK (Flutter verbose)
        run: flutter build apk -v

      # Alternative: use Gradle directly (optional)
      #- name: Build Android APK (gradle stacktrace)
      #  working-directory: android
      #  run: ./gradlew assembleDebug --stacktrace --info --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yemen-laws-apk-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
