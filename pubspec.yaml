name: yemen_laws_encyclopedia
description: "موسوعة القوانين اليمنية - تطبيق مجاني يعمل بدون إنترنت"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # قاعدة البيانات المحلية
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # إدارة الحالة
  provider: ^6.1.2

  # المشاركة والنسخ
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/db/app_database.db
    # assets/icon/app_icon.png هي نسخة عالية الدقة من أيقونة التطبيق (512×512)
    # للمرجعية فقط أو للاستخدام مع flutter_launcher_icons مستقبلاً - أيقونات
    # الأندرويد الفعلية موجودة بالفعل في android/app/src/main/res/mipmap-*/

  # في حال أضفت خطوطًا عربية مخصصة (مثل خط "Cairo" أو "Tajawal") ضعها هنا:
  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: assets/fonts/Cairo-Regular.ttf
  #       - asset: assets/fonts/Cairo-Bold.ttf
  #         weight: 700
