plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0.0"
}

// إعدادات توقيع نسخة الإصدار (Release Signing)
// إن أنشأت ملف android/key.properties (راجع key.properties.example وقسم
// "التوقيع للنشر" في README) سيُستخدم مفتاحك الخاص تلقائيًا، وإلا يستمر
// التطبيق بالتوقيع بمفتاح التصحيح المؤقت حتى يعمل "flutter build apk" فورًا.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
def hasReleaseKeystore = keystorePropertiesFile.exists()
if (hasReleaseKeystore) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    // معرّف الحزمة (يجب أن يطابق applicationId أدناه ومسار حزمة MainActivity.kt)
    namespace "com.yemenlaws.encyclopedia"

    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        // معرّف التطبيق الفريد على متجر بلاي - غيّره قبل النشر إن رغبت
        applicationId "com.yemenlaws.encyclopedia"
        minSdk 21
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            // إن وُجد android/key.properties يُستخدم مفتاح التوقيع الحقيقي،
            // وإلا نوقّع مؤقتًا بمفتاح التصحيح (debug) حتى يعمل الأمر
            // "flutter build apk --release" مباشرة بدون أي إعداد إضافي.
            signingConfig hasReleaseKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"
}
