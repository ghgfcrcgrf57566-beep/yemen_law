name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Show environment info
        run: |
          echo "=== java -version ==="
          java -version || true
          echo "=== flutter doctor -v ==="
          flutter doctor -v || true
          echo "=== Check gradle wrapper files ==="
          ls -la android/gradle || true
          ls -la android/gradle/wrapper || true
          echo "=== gradlew --version (if exists) ==="
          if [ -x ./gradlew ]; then ./gradlew --version || true; else echo "no gradlew"; fi

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Android APK (Flutter verbose)
        run: flutter build apk -v

      # بديل: لو تفضل استخدام gradle مباشرة، فكّر بهذا (معلّق/اختياري)
      #- name: Build Android APK (gradle stacktrace)
      #  working-directory: android
      #  run: ./gradlew assembleDebug --stacktrace --info --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yemen-laws-apk-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
